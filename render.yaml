version: 1

databases:
  - name: mydb
    plan: free
    databaseName: petvet_db

services:
  - type: web
    name: petvet-backend
    runtime: python
    plan: free
    region: frankfurt

    buildCommand: |
      cd backend &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput --clear

    startCommand: |
      cd backend &&
      gunicorn tt.wsgi:application --workers 3 --timeout 120

    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: mydb
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"
