version: 1

# ==================== DATABASE ====================
databases:
  - name: mydb
    plan: free
    databaseName: tt_db

# ==================== DJANGO BACKEND ====================
services:
  - type: web
    name: petvet
    runtime: python
    plan: free
    region: frankfurt

    # Build command avec cd dans le dossier backend
    buildCommand: |
      cd backend &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput --clear

    # Start command avec cd dans le dossier backend
    startCommand: |
      cd backend &&
      gunicorn tt.wsgi:application --workers 3 --timeout 120

    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: mydb
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"
